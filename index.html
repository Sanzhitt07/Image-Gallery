<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>📸 My Image Gallery</h1>

<p>Click on any image to view it in full screen.</p>

</header>

<div class="gallery">

<img src="photo1.jpg" alt="Photo 1" onclick="openImage(this.src)">

<img src="photo2.jpg" alt="Photo 2" onclick="openImage(this.src)">

<img src="photo3.jpg" alt="Photo 3" onclick="openImage(this.src)">

<img src="photo4.jpg" alt="Photo 4" onclick="openImage(this.src)">

<img src="photo5.jpg" alt="Photo 5" onclick="openImage(this.src)">

</div>

<div class="lightbox" id="lightbox">

<span class="close" onclick="closeImage()">&times;</span>

<img id="preview">

</div>

<script src="script.js"></script>

</body>
</html>
